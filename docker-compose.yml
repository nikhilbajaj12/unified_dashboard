version: "3.9"

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: unified_dash-app
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - PHOENIX_BASE_URL=${PHOENIX_BASE_URL:-http://phoenix:6006}
      - PHOENIX_OTLP_ENDPOINT=${PHOENIX_OTLP_ENDPOINT:-http://phoenix:4317}
      - PHOENIX_API_KEY=${PHOENIX_API_KEY:-}
      - TEMPORAL_BASE_URL=${TEMPORAL_BASE_URL:-}
      - TEMPORAL_NAMESPACES=${TEMPORAL_NAMESPACES:-}
      - METRICS_PORT=8001
    networks:
      - unified-network
    depends_on:
      - phoenix
    restart: unless-stopped

  phoenix-db:
    image: postgres:15-alpine
    container_name: phoenix-db
    environment:
      - POSTGRES_USER=phoenix
      - POSTGRES_PASSWORD=phoenix
      - POSTGRES_DB=phoenix
    volumes:
      - phoenix_db_data:/var/lib/postgresql/data
    networks:
      - unified-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix-server
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      - PHOENIX_DATABASE_URL=postgresql://phoenix:phoenix@phoenix-db:5432/phoenix
    depends_on:
      phoenix-db:
        condition: service_healthy
    networks:
      - unified-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./app/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - unified-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
      - GF_UNIFIED_ALERTING_ENABLED=true
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - PHOENIX_BASE_URL=${PHOENIX_BASE_URL:-}
      - PHOENIX_API_KEY=${PHOENIX_API_KEY:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./app/config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - unified-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  unified-network:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  phoenix_db_data:
